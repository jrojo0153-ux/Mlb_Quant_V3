name: Daily MLB Quant Analysis

on:
  schedule:
    # Ejecuta cada hora del minuto 0 entre las 17:00 UTC y las 05:00 UTC
    # (11:00 AM - 11:00 PM hora CDMX)
    - cron: '0 17-23,0-5 * * *'
  workflow_dispatch: # Permite ejecución manual

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install python-dotenv requests schedule

      - name: Run Bot Session
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          python bot_produccion.py

      - name: Commit and push logs
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add bot_mlb_prod.log
          git commit -m "Auto-update: Hourly Analysis Logs" || echo "No changes to commit"
          git push
