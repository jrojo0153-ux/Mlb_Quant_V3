name: MLB Quant Hourly Pipeline

on:
  schedule:
    - cron: '0 * * * *' # Ejecuta cada hora
  workflow_dispatch: # Permite ejecución manual

jobs:
  mlb-quant-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install python-dotenv requests schedule

      - name: Run Bot Production
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python bot_produccion.py

      - name: Commit and push logs
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add -f bot_mlb_prod.log
          git commit -m "Auto-update: Hourly MLB Quant Analysis Logs" || echo "No changes to commit"
          git push || echo "Nothing to push"
