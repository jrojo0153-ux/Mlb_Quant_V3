name: MLB Quant Unified Pipeline

on:
  schedule:
    - cron: '0 * * * *' # Ejecuta cada hora
  workflow_dispatch:

jobs:
  execute-ensemble:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install pandas numpy scikit-learn xgboost lightgbm catboost joblib requests python-telegram-bot

      - name: Run Pipeline
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main_pipeline.py
